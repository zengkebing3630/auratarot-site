<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AuraTarot</title>
  <meta name="description" content="AuraTarot 用 AI 深度解牌，在迷茫时提供情绪指引与命运洞察，沉浸式塔罗占卜体验。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #0c1018;
      --ink-mid: #151c2a;
      --mist: #c8d0dc;
      --cream: #e8e2d6;
      --amber: #c9a46c;
      --amber-soft: rgba(201, 164, 108, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Source Sans 3", system-ui, sans-serif;
      color: var(--cream);
      background:
        radial-gradient(ellipse 90% 60% at 50% -10%, rgba(201, 164, 108, 0.18), transparent 55%),
        radial-gradient(ellipse 70% 50% at 80% 100%, rgba(70, 90, 130, 0.25), transparent 50%),
        linear-gradient(165deg, var(--ink) 0%, var(--ink-mid) 55%, #0a0e14 100%);
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4rem 1.5rem 3rem;
      max-width: 40rem;
      margin: 0 auto;
    }

    .brand {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.75rem, 8vw, 4rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      line-height: 1.1;
      color: var(--cream);
    }

    .brand-cn {
      margin-top: 0.4rem;
      font-size: 0.95rem;
      letter-spacing: 0.35em;
      color: var(--amber);
      font-weight: 500;
    }

    .divider {
      width: 3rem;
      height: 1px;
      margin: 1.75rem auto;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
    }

    .intro {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--mist);
      max-width: 32rem;
    }

    .intro-en {
      margin-top: 1rem;
      font-size: 0.95rem;
      line-height: 1.65;
      color: rgba(200, 208, 220, 0.75);
      font-style: italic;
    }

    .status {
      margin-top: 2.25rem;
      display: inline-block;
      padding: 0.55rem 1.25rem;
      border: 1px solid var(--amber-soft);
      color: var(--amber);
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    footer {
      padding: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(200, 208, 220, 0.45);
    }

    footer a {
      color: rgba(201, 164, 108, 0.8);
      text-decoration: none;
    }

    footer a:hover { color: var(--amber); }
  </style>
</head>
<body>
  <main>
    <h1 class="brand">AuraTarot</h1>
    <p class="brand-cn">塔罗牌</p>
    <div class="divider" aria-hidden="true"></div>
    <p class="intro">AuraTarot 用 AI 深度解牌，在迷茫时提供情绪指引与命运洞察，沉浸式塔罗占卜体验。</p>
    <p class="intro-en">AuraTarot uses AI readings to guide emotions and reveal life clarity.</p>
    <p class="status">正在开发中 · Coming Soon</p>
  </main>
  <footer>
    <a href="privacy.html">Privacy Policy</a>
    <span> · </span>
    <span>© AuraTarot</span>
  </footer>
</body>
</html>
